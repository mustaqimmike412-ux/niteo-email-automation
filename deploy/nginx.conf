# Nginx 配置文件 - Niteo Solar 邮件自动化系统
# 放置在 /etc/nginx/sites-available/email-automation

# 加载 GeoIP2 模块（Ubuntu 已预装 libnginx-mod-http-geoip2）
geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb {
    $geoip2_country_code country iso_code;
    $geoip2_country_name country names en;
}

server {
    listen 80;
    server_name exim-flow.com www.exim-flow.com;

    # 拦截中国 IP（双重保险：Cloudflare + Nginx GeoIP2）
    if ($geoip2_country_code = CN) {
        return 403 "Access denied from your region.";
    }

    # 拦截 Cloudflare 透传的真实 IP 中的中国流量
    if ($http_cf_ipcountry = CN) {
        return 403 "Access denied from your region.";
    }

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # 静态文件（仪表盘前端）
    location /static {
        alias /var/www/email_automation/dashboard;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # API 代理到 Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Country-Code $geoip2_country_code;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
